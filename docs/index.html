<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ავტოდაილერი">
  <meta name="theme-color" content="#161618">
  <meta name="color-scheme" content="dark">
  <title>ავტოდაილერი</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #161618;
      --surface: #222224;
      --line: #333;
      --text: #ececec;
      --dim: #999;
      --blue: #4d9fff;
      --green: #32d74b;
      --red: #ff453a;
      --bar: 64px;
    }
    body {
      font-family: -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      line-height: 1.45;
      min-height: 100dvh;
    }
    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding-top: env(safe-area-inset-top);
      padding-bottom: calc(var(--bar) + env(safe-area-inset-bottom) + 8px);
    }

    h1 {
      font-size: 18px;
      text-align: center;
      padding: 14px 16px 10px;
      font-weight: 600;
    }

    .tabs {
      display: flex;
      margin: 0 16px 12px;
      background: var(--surface);
      border-radius: 10px;
      padding: 3px;
    }
    .tabs button {
      flex: 1;
      border: none;
      background: none;
      color: var(--dim);
      font-size: 14px;
      font-family: inherit;
      padding: 9px 4px;
      border-radius: 8px;
    }
    .tabs button.on {
      background: var(--bg);
      color: var(--text);
      font-weight: 600;
    }

    .body {
      flex: 1;
      padding: 0 16px;
      overflow-y: auto;
    }
    .page { display: none; }
    .page.on { display: block; }

    #status {
      font-size: 14px;
      color: var(--dim);
      padding: 10px 12px;
      background: var(--surface);
      border-radius: 10px;
      margin-bottom: 12px;
      min-height: 42px;
    }
    #status.work { color: var(--green); }

    textarea, input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 14px;
      color: var(--text);
      font-size: 16px;
      font-family: inherit;
    }
    textarea {
      min-height: 160px;
      line-height: 1.5;
      resize: vertical;
    }
    textarea:disabled { opacity: 0.55; }
    textarea::placeholder, input::placeholder { color: #666; }
    input { margin-bottom: 10px; }

    .tools {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 10px 0 0;
      font-size: 13px;
      color: var(--dim);
    }
    .tools div button {
      background: none;
      border: none;
      color: var(--blue);
      font-size: 13px;
      font-family: inherit;
      padding: 6px 0 6px 12px;
    }
    .tools div button.red { color: var(--red); }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
      gap: 12px;
    }
    .row:last-child { border-bottom: none; }
    .row b { font-size: 15px; display: block; margin-bottom: 2px; }
    .row small { font-size: 13px; color: var(--dim); }
    .row button {
      flex-shrink: 0;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 14px;
      font-family: inherit;
    }

    .sms-hint {
      font-size: 13px;
      color: var(--dim);
      margin: 10px 0 12px;
      line-height: 1.4;
    }
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 10px;
    }
    .sms-card h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
    }
    .sms-text {
      font-size: 15px;
      line-height: 1.5;
      color: var(--text);
      background: var(--bg);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .sms-card button {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 8px;
      background: var(--blue);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
    }

    .hist {
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
      font-size: 15px;
    }
    .hist span { display: block; font-size: 13px; color: var(--dim); margin-top: 2px; }
    .empty { text-align: center; color: var(--dim); padding: 40px 0; font-size: 14px; }

    .bar {
      position: fixed;
      left: 0; right: 0; bottom: env(safe-area-inset-bottom);
      padding: 10px 16px;
      background: var(--bg);
      border-top: 1px solid var(--line);
    }
    .bar .go {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: var(--green);
      color: #000;
      font-size: 17px;
      font-weight: 600;
      font-family: inherit;
    }
    .bar .stop {
      width: 100%;
      padding: 14px;
      border: 1px solid var(--red);
      border-radius: 10px;
      background: transparent;
      color: var(--red);
      font-size: 16px;
      font-family: inherit;
    }

    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.65);
      display: flex; align-items: center; justify-content: center;
      padding: 20px; z-index: 50;
    }
    .box {
      background: var(--surface);
      border-radius: 14px;
      padding: 22px 18px;
      width: 100%; max-width: 300px;
      text-align: center;
    }
    .box .lbl { font-size: 13px; color: var(--dim); }
    .box .num { font-size: 21px; font-weight: 700; margin: 8px 0 18px; }
    .box .go { width: 100%; margin-top: 8px; padding: 14px; border: none; border-radius: 10px; background: var(--green); color: #000; font-size: 16px; font-weight: 600; font-family: inherit; }
    .box .skip { width: 100%; margin-top: 8px; padding: 13px; border: 1px solid var(--line); border-radius: 10px; background: none; color: var(--dim); font-size: 15px; font-family: inherit; }
    .box p { font-size: 14px; color: var(--dim); margin: 8px 0 16px; line-height: 1.5; }
    .hide { display: none !important; }
  </style>
</head>
<body>
  <div class="app">
    <h1>ავტოდაილერი</h1>

    <div class="tabs">
      <button class="on" data-v="dial" type="button">დარეკვა</button>
      <button data-v="sms" type="button">SMS</button>
      <button data-v="history" type="button">ისტორია</button>
    </div>

    <div class="body">
      <div id="status">ჩასვი ნომრები და დააჭირე დაწყებას</div>

      <div class="page on" id="p-dial">
        <textarea id="nums" placeholder="თითო ხაზზე ერთი ნომერი"></textarea>
        <div class="tools">
          <span><b id="ncount">0</b> ნომერი</span>
          <div>
            <button id="paste" type="button">ჩასმა</button>
            <button class="red" id="clear" type="button">გასუფთავება</button>
          </div>
        </div>
      </div>

      <div class="page" id="p-sms">
        <input type="tel" id="sms-num" placeholder="ტელეფონის ნომერი" inputmode="tel">
        <p class="sms-hint">აირჩიე შაბლონი — ქვემოთ ჩანს ზუსტად რა ტექსტი გაიგზავნება</p>
        <div id="sms-list"></div>
      </div>

      <div class="page" id="p-history">
        <div class="tools" style="margin-bottom:8px">
          <span>ბოლო ზარები</span>
          <button class="red" id="clr-hist" type="button" style="padding-right:0">გასუფთავება</button>
        </div>
        <div id="hist"><p class="empty">ცარიელია</p></div>
      </div>
    </div>
  </div>

  <div class="bar" id="action-bar">
    <button class="go" id="start" type="button">დაწყება</button>
    <button class="stop hide" id="stop" type="button">გაჩერება</button>
  </div>

  <div class="overlay hide" id="next-modal">
    <div class="box">
      <div class="lbl" id="next-lbl">შემდეგი</div>
      <div class="num" id="next-num"></div>
      <button class="go" id="next-go" type="button">დარეკვა</button>
      <button class="skip" id="next-skip" type="button">გამოტოვება</button>
    </div>
  </div>

  <div class="overlay hide" id="time-modal">
    <div class="box">
      <div class="num">30 წამი გავიდა</div>
      <p>გათიშე ზარი და დაბრუნდი აპში</p>
      <button class="go" id="time-ok" type="button">კარგი</button>
    </div>
  </div>

  <script>
    const SMS = [
      ['ზარის მოთხოვნა', 'გამარჯობა! გთხოვთ დაგვიბრუნოთ ზარი, როცა შეძლებთ. გმადლობთ!'],
      ['შეხსენება', 'გამარჯობა! გიგზავნით შეხსენებას — გთხოვთ დაგვიკავშირდეთ დღესვე. გმადლობთ!'],
      ['ვიზიტის დადასტურება', 'გამარჯობა! თქვენი ვიზიტი დადასტურებულია. დამატებითი კითხვებისთვის დაგვიკავშირდით.'],
      ['გადახდის შეხსენება', 'გამარჯობა! გიგზავნით შეხსენებას გადასახადის გადახდის შესახებ. გმადლობთ ყურადღებისთვის!'],
      ['მადლობა', 'გმადლობთ ჩვენთან კავშირისთვის! საჭიროების შემთხვევაში ნებისმიერ დროს დაგვიკავშირდით.']
    ];
    const TOUT = 30;
    const S = { q: [], i: 0, run: false, t0: null, ti: null, wait: false, to: false };

    const $ = id => document.getElementById(id);
    const st = $('status');

    function setStatus(t, work) {
      st.textContent = t;
      st.classList.toggle('work', !!work);
    }

    function goTab(v) {
      document.querySelectorAll('.tabs button').forEach(x => x.classList.toggle('on', x.dataset.v === v));
      document.querySelectorAll('.page').forEach(x => x.classList.remove('on'));
      $('p-' + v).classList.add('on');
      $('action-bar').classList.toggle('hide', v !== 'dial');
    }

    document.querySelectorAll('.tabs button').forEach(b => b.onclick = () => goTab(b.dataset.v));

    function parse(t) {
      return t.split(/[\n,;]+/).map(n => n.trim().replace(/[\s\-()]/g, ''))
        .filter(n => n.replace(/\D/g, '').length >= 9)
        .filter((n, i, a) => a.indexOf(n) === i);
    }
    function tel(n) { return n.replace(/[^\d+]/g, ''); }
    function count() { $('ncount').textContent = parse($('nums').value).length; }

    function hist() {
      try { return JSON.parse(localStorage.getItem('hist') || '[]'); } catch { return []; }
    }
    function addHist(num, note) {
      const h = hist();
      h.unshift({ num, note, t: new Date().toLocaleString('ka-GE', { hour: '2-digit', minute: '2-digit' }) });
      localStorage.setItem('hist', JSON.stringify(h.slice(0, 50)));
      showHist();
    }
    function showHist() {
      const h = hist();
      $('hist').innerHTML = h.length
        ? h.map(x => `<div class="hist">${x.num}<span>${x.note} · ${x.t}</span></div>`).join('')
        : '<p class="empty">ცარიელია</p>';
    }

    function timer(on) {
      clearInterval(S.ti);
      if (!on) return;
      S.t0 = Date.now(); S.to = false;
      S.ti = setInterval(() => {
        const left = TOUT - (Date.now() - S.t0) / 1000;
        if (left > 0) setStatus(`ირეკება ${S.i + 1}/${S.q.length} · ${S.q[S.i]} · ${Math.ceil(left)} წმ`, true);
        else if (!S.to) { S.to = true; $('time-modal').classList.remove('hide'); }
      }, 500);
    }

    function dial(n) { location.href = 'tel:' + tel(n); }

    function start() {
      S.q = parse($('nums').value);
      if (!S.q.length) { setStatus('შეიყვანე ნომერი'); return; }
      S.i = 0; S.run = true;
      $('start').classList.add('hide');
      $('stop').classList.remove('hide');
      $('nums').disabled = true;
      localStorage.setItem('nums', $('nums').value);
      call();
    }

    function call() {
      if (!S.run || S.i >= S.q.length) { done(); return; }
      S.wait = true;
      timer(true);
      dial(S.q[S.i]);
    }

    function returned() {
      if (!S.run || !S.wait) return;
      S.wait = false;
      timer(false);
      const n = S.q[S.i];
      const sec = S.t0 ? (Date.now() - S.t0) / 1000 : 0;
      const ok = sec > 8 && sec < TOUT;
      addHist(n, ok ? 'მიპასუხეს' : 'არ მიპასუხეს');
      setStatus(ok ? `${n} — მიპასუხეს` : `${n} — არ მიპასუხეს`);
      S.i++;
      if (S.run && S.i < S.q.length) {
        $('next-num').textContent = S.q[S.i];
        $('next-lbl').textContent = `შემდეგი (${S.i + 1}/${S.q.length})`;
        $('next-modal').classList.remove('hide');
        clearTimeout($('next-modal')._t);
        $('next-modal')._t = setTimeout(next, 3000);
      } else if (S.run) done();
    }

    function next() {
      $('next-modal').classList.add('hide');
      clearTimeout($('next-modal')._t);
      if (S.run) call();
    }

    function reset() {
      $('start').classList.remove('hide');
      $('stop').classList.add('hide');
      $('nums').disabled = false;
      $('next-modal').classList.add('hide');
      $('time-modal').classList.add('hide');
    }

    function done() {
      S.run = false; S.wait = false;
      timer(false); reset();
      setStatus('დასრულდა ✓');
    }

    function stopAll() {
      S.run = false; S.wait = false;
      timer(false); reset();
      setStatus('გაჩერებულია');
    }

    $('sms-list').innerHTML = SMS.map(([t, m], i) =>
      `<div class="sms-card"><h3>${t}</h3><div class="sms-text">${m}</div><button type="button" data-i="${i}">გაგზავნა</button></div>`
    ).join('');
    $('sms-list').onclick = e => {
      const b = e.target.closest('[data-i]');
      if (!b) return;
      const n = tel($('sms-num').value || $('nums').value.split('\n').find(l => l.trim()) || '');
      if (!n) { setStatus('მიუთითე ნომერი SMS-ისთვის'); goTab('sms'); return; }
      location.href = 'sms:' + n + '?body=' + encodeURIComponent(SMS[+b.dataset.i][1]);
    };

    $('nums').oninput = count;
    $('start').onclick = start;
    $('stop').onclick = stopAll;
    $('next-go').onclick = next;
    $('next-skip').onclick = () => { $('next-modal').classList.add('hide'); S.i++; S.run && S.i < S.q.length ? call() : done(); };
    $('time-ok').onclick = () => $('time-modal').classList.add('hide');
    $('paste').onclick = async () => {
      try {
        const t = await navigator.clipboard.readText();
        if (t) { $('nums').value = t; count(); setStatus('ჩასმულია'); }
      } catch { setStatus('ჩასმა ვერ მოხერხდა'); }
    };
    $('clear').onclick = () => { $('nums').value = ''; count(); localStorage.removeItem('nums'); };
    $('clr-hist').onclick = () => { localStorage.removeItem('hist'); showHist(); };

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') setTimeout(returned, 400);
    });
    window.addEventListener('pageshow', e => { if (e.persisted) setTimeout(returned, 400); });
    if ('serviceWorker' in navigator) navigator.serviceWorker.getRegistrations().then(r => r.forEach(x => x.unregister()));

    const saved = localStorage.getItem('nums');
    if (saved) $('nums').value = saved;
    count(); showHist();
  </script>
</body>
</html>
