<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ავტოდაილერი">
  <meta name="theme-color" content="#1c1c1e">
  <meta name="color-scheme" content="dark">
  <title>ავტოდაილერი</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    :root {
      --bg: #1c1c1e;
      --card: #2c2c2e;
      --input: #3a3a3c;
      --border: #3a3a3c;
      --text: #f2f2f7;
      --muted: #98989f;
      --accent: #0a84ff;
      --green: #30d158;
      --red: #ff453a;
      --radius: 12px;
      --pad: 16px;
      --tabs: 56px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      line-height: 1.5;
      min-height: 100dvh;
    }
    .wrap {
      max-width: 480px;
      margin: 0 auto;
      padding: calc(env(safe-area-inset-top) + 12px) var(--pad) calc(var(--tabs) + env(safe-area-inset-bottom) + 12px);
    }
    header { margin-bottom: 20px; }
    header h1 { font-size: 22px; font-weight: 700; }
    header p { font-size: 14px; color: var(--muted); margin-top: 4px; }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 14px var(--pad);
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 10px;
    }
    .card-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .card-row .card-title { margin-bottom: 0; }

    #status-text { font-size: 15px; color: var(--text); }
    #status-text.calling { color: var(--green); }
    #status-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

    textarea, .field {
      width: 100%;
      background: var(--input);
      border: none;
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 16px;
      font-family: inherit;
      line-height: 1.45;
    }
    textarea { min-height: 130px; resize: vertical; }
    textarea:disabled { opacity: 0.5; }
    textarea::placeholder, .field::placeholder { color: #636366; }
    textarea:focus, .field:focus { outline: 2px solid var(--accent); outline-offset: 0; }

    .foot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .foot button {
      background: none; border: none; font-family: inherit;
      font-size: 13px; color: var(--accent); padding: 4px 0;
    }
    .foot button.danger { color: var(--red); }

    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: var(--radius);
      font-size: 17px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
    }
    .btn-green { background: var(--green); color: #000; }
    .btn-red {
      background: transparent;
      color: var(--red);
      border: 1px solid rgba(255,69,58,.4);
      margin-top: 8px;
    }
    .btn-blue {
      background: var(--accent);
      color: #fff;
      padding: 8px 14px;
      width: auto;
      font-size: 14px;
      border-radius: 8px;
    }

    .page { display: none; }
    .page.on { display: block; }

    .sms-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .sms-item:last-child { border-bottom: none; padding-bottom: 0; }
    .sms-item:first-child { padding-top: 0; }
    .sms-item strong { display: block; font-size: 15px; margin-bottom: 3px; }
    .sms-item span { font-size: 13px; color: var(--muted); line-height: 1.4; }

    .hist-item {
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .hist-item:last-child { border-bottom: none; }
    .hist-item .num { font-size: 15px; font-weight: 500; }
    .hist-item .info { font-size: 13px; color: var(--muted); margin-top: 2px; }

    .empty { text-align: center; color: var(--muted); font-size: 14px; padding: 24px 0; }

    .tabs {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      display: flex;
      background: var(--card);
      border-top: 1px solid var(--border);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .tabs button {
      flex: 1;
      padding: 14px 8px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 13px;
      font-family: inherit;
    }
    .tabs button.on { color: var(--accent); font-weight: 600; }

    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6);
      display: flex; align-items: center; justify-content: center;
      padding: var(--pad); z-index: 50;
    }
    .modal {
      background: var(--card);
      border-radius: 16px;
      padding: 24px var(--pad);
      width: 100%; max-width: 320px;
      text-align: center;
    }
    .modal h2 { font-size: 14px; color: var(--muted); font-weight: 500; margin-bottom: 8px; }
    .modal .phone { font-size: 22px; font-weight: 700; margin-bottom: 20px; }
    .modal p { font-size: 14px; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }
    .modal .btn { margin-top: 8px; }

    .hide { display: none !important; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>ავტოდაილერი</h1>
      <p>ნომრების ავტომატური დარეკვა</p>
    </header>

    <div class="card" id="status-card">
      <div class="card-title">სტატუსი</div>
      <div id="status-text">ჩასვი ნომრები და დააჭირე დაწყებას</div>
      <div id="status-sub"></div>
    </div>

    <div class="page on" id="p-dial">
      <div class="card">
        <div class="card-row">
          <div class="card-title">ნომრები</div>
          <div class="foot" style="margin:0">
            <button id="paste" type="button">ჩასმა</button>
            <button class="danger" id="clear" type="button">გასუფთავება</button>
          </div>
        </div>
        <textarea id="nums" placeholder="თითო ხაზზე ერთი ნომერი&#10;მაგ: 599123456"></textarea>
        <div class="foot"><span><b id="ncount">0</b> ნომერი</span></div>
      </div>
      <button class="btn btn-green" id="start" type="button">დაწყება</button>
      <button class="btn btn-red hide" id="stop" type="button">გაჩერება</button>
    </div>

    <div class="page" id="p-sms">
      <div class="card">
        <div class="card-title">მიმღების ნომერი</div>
        <input class="field" type="tel" id="sms-num" placeholder="+995 5XX XX XX XX" inputmode="tel">
      </div>
      <div class="card">
        <div class="card-title">შაბლონები</div>
        <div id="sms-list"></div>
      </div>
    </div>

    <div class="page" id="p-history">
      <div class="card">
        <div class="card-row">
          <div class="card-title">ბოლო ზარები</div>
          <button class="danger" id="clr-hist" type="button" style="background:none;border:none;color:var(--red);font-size:13px;font-family:inherit">გასუფთავება</button>
        </div>
        <div id="hist"><p class="empty">ჯერ ცარიელია</p></div>
      </div>
    </div>
  </div>

  <nav class="tabs">
    <button class="on" data-v="dial" type="button">დარეკვა</button>
    <button data-v="sms" type="button">SMS</button>
    <button data-v="history" type="button">ისტორია</button>
  </nav>

  <div class="overlay hide" id="next-modal">
    <div class="modal">
      <h2 id="next-lbl">შემდეგი ნომერი</h2>
      <div class="phone" id="next-num"></div>
      <button class="btn btn-green" id="next-go" type="button">დარეკვა</button>
      <button class="btn btn-red" id="next-skip" type="button">გამოტოვება</button>
    </div>
  </div>

  <div class="overlay hide" id="time-modal">
    <div class="modal">
      <div class="phone">30 წამი გავიდა</div>
      <p>გათიშე ზარი ხელით და დაბრუნდი აპში — ავტომატურად გაგრძელდება</p>
      <button class="btn btn-green" id="time-ok" type="button">გასაგებია</button>
    </div>
  </div>

  <script>
    const SMS = [
      ['ზარის მოთხოვნა', 'გამარჯობა! გთხოვთ დაგვიბრუნოთ ზარი, როცა შეძლებთ. გმადლობთ!'],
      ['შეხსენება', 'გამარჯობა! გიგზავნით შეხსენებას — გთხოვთ დაგვიკავშირდეთ დღესვე. გმადლობთ!'],
      ['ვიზიტის დადასტურება', 'გამარჯობა! თქვენი ვიზიტი დადასტურებულია.'],
      ['გადახდის შეხსენება', 'გამარჯობა! გიგზავნით შეხსენებას გადასახადის შესახებ.'],
      ['მადლობა', 'გმადლობთ ჩვენთან კავშირისთვის!']
    ];
    const TOUT = 30;
    const S = { q: [], i: 0, run: false, t0: null, ti: null, wait: false, to: false };

    const $ = id => document.getElementById(id);
    const statusEl = $('status-text');
    const statusSub = $('status-sub');

    function setStatus(main, sub, calling) {
      statusEl.textContent = main;
      statusSub.textContent = sub || '';
      statusEl.classList.toggle('calling', !!calling);
    }

    document.querySelectorAll('.tabs button').forEach(b => {
      b.onclick = () => {
        document.querySelectorAll('.tabs button').forEach(x => x.classList.remove('on'));
        document.querySelectorAll('.page').forEach(x => x.classList.remove('on'));
        b.classList.add('on');
        $('p-' + b.dataset.v).classList.add('on');
      };
    });

    function parse(t) {
      return t.split(/[\n,;]+/).map(n => n.trim().replace(/[\s\-()]/g, ''))
        .filter(n => n.replace(/\D/g, '').length >= 9)
        .filter((n, i, a) => a.indexOf(n) === i);
    }
    function tel(n) { return n.replace(/[^\d+]/g, ''); }

    function count() { $('ncount').textContent = parse($('nums').value).length; }

    function hist() {
      try { return JSON.parse(localStorage.getItem('hist') || '[]'); } catch { return []; }
    }
    function addHist(num, note) {
      const h = hist();
      h.unshift({ num, note, t: new Date().toLocaleString('ka-GE', { hour: '2-digit', minute: '2-digit', day: 'numeric', month: 'short' }) });
      localStorage.setItem('hist', JSON.stringify(h.slice(0, 50)));
      showHist();
    }
    function showHist() {
      const h = hist();
      $('hist').innerHTML = h.length
        ? h.map(x => `<div class="hist-item"><div class="num">${x.num}</div><div class="info">${x.note} · ${x.t}</div></div>`).join('')
        : '<p class="empty">ჯერ ცარიელია</p>';
    }

    function timer(on) {
      clearInterval(S.ti);
      if (!on) return;
      S.t0 = Date.now(); S.to = false;
      S.ti = setInterval(() => {
        const left = TOUT - (Date.now() - S.t0) / 1000;
        if (left > 0) {
          setStatus(`ირეკება ${S.i + 1}/${S.q.length}`, `${S.q[S.i]} · ${Math.ceil(left)} წმ დარჩა`, true);
        } else if (!S.to) {
          S.to = true;
          $('time-modal').classList.remove('hide');
        }
      }, 500);
    }

    function dial(n) { location.href = 'tel:' + tel(n); }

    function start() {
      S.q = parse($('nums').value);
      if (!S.q.length) { setStatus('შეიყვანე მაინც ერთი ნომერი', ''); return; }
      S.i = 0; S.run = true;
      $('start').classList.add('hide');
      $('stop').classList.remove('hide');
      $('nums').disabled = true;
      localStorage.setItem('nums', $('nums').value);
      call();
    }

    function call() {
      if (!S.run || S.i >= S.q.length) { done(); return; }
      S.wait = true;
      timer(true);
      dial(S.q[S.i]);
    }

    function returned() {
      if (!S.run || !S.wait) return;
      S.wait = false;
      timer(false);
      const n = S.q[S.i];
      const sec = S.t0 ? (Date.now() - S.t0) / 1000 : 0;
      const ok = sec > 8 && sec < TOUT;
      addHist(n, ok ? 'მიპასუხეს' : 'არ მიპასუხეს');
      setStatus(ok ? 'მიპასუხეს ✓' : 'არ მიპასუხეს', n);
      S.i++;
      if (S.run && S.i < S.q.length) {
        $('next-num').textContent = S.q[S.i];
        $('next-lbl').textContent = `შემდეგი (${S.i + 1}/${S.q.length})`;
        $('next-modal').classList.remove('hide');
        clearTimeout($('next-modal')._t);
        $('next-modal')._t = setTimeout(next, 3000);
      } else if (S.run) done();
    }

    function next() {
      $('next-modal').classList.add('hide');
      clearTimeout($('next-modal')._t);
      if (S.run) call();
    }

    function resetUI() {
      $('start').classList.remove('hide');
      $('stop').classList.add('hide');
      $('nums').disabled = false;
      $('next-modal').classList.add('hide');
      $('time-modal').classList.add('hide');
    }

    function done() {
      S.run = false; S.wait = false;
      timer(false);
      resetUI();
      setStatus('ყველა ნომერზე დასრულდა', `${S.q.length} ნომერი დამუშავდა`);
    }

    function stopAll() {
      S.run = false; S.wait = false;
      timer(false);
      resetUI();
      setStatus('გაჩერებულია', '');
    }

    $('sms-list').innerHTML = SMS.map(([title, msg], i) =>
      `<div class="sms-item"><div><strong>${title}</strong><span>${msg}</span></div><button class="btn btn-blue" type="button" data-i="${i}">გაგზავნა</button></div>`
    ).join('');
    $('sms-list').onclick = e => {
      const btn = e.target.closest('[data-i]');
      if (!btn) return;
      const msg = SMS[+btn.dataset.i][1];
      const n = tel($('sms-num').value || $('nums').value.split('\n').find(l => l.trim()) || '');
      if (!n) { setStatus('მიუთითე ნომერი SMS-ისთვის', 'SMS ჩანართში'); return; }
      location.href = 'sms:' + n + '?body=' + encodeURIComponent(msg);
    };

    $('nums').oninput = count;
    $('start').onclick = start;
    $('stop').onclick = stopAll;
    $('next-go').onclick = next;
    $('next-skip').onclick = () => { $('next-modal').classList.add('hide'); S.i++; S.run && S.i < S.q.length ? call() : done(); };
    $('time-ok').onclick = () => $('time-modal').classList.add('hide');
    $('paste').onclick = async () => {
      try {
        const t = await navigator.clipboard.readText();
        if (t) { $('nums').value = t; count(); setStatus('ნომრები ჩასმულია', ''); }
      } catch { setStatus('ჩასმა ვერ მოხერხდა', 'ხელით ჩასვი'); }
    };
    $('clear').onclick = () => { $('nums').value = ''; count(); localStorage.removeItem('nums'); };
    $('clr-hist').onclick = () => { localStorage.removeItem('hist'); showHist(); };

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') setTimeout(returned, 400);
    });
    window.addEventListener('pageshow', e => { if (e.persisted) setTimeout(returned, 400); });
    if ('serviceWorker' in navigator) navigator.serviceWorker.getRegistrations().then(r => r.forEach(x => x.unregister()));

    const saved = localStorage.getItem('nums');
    if (saved) $('nums').value = saved;
    count(); showHist();
  </script>
</body>
</html>
