<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ავტოდაილერი">
  <meta name="theme-color" content="#161618">
  <meta name="color-scheme" content="dark">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>ავტოდაილერი v35</title>
  <link rel="manifest" href="manifest.json?v=27">
  <link rel="apple-touch-icon" href="apple-touch-icon.png?v=27">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png?v=27">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png?v=27">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #161618;
      --surface: #222224;
      --line: #333;
      --text: #ececec;
      --dim: #999;
      --blue: #4d9fff;
      --green: #32d74b;
      --red: #ff453a;
      --bar: 64px;
    }
    body {
      font-family: -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      line-height: 1.45;
      min-height: 100dvh;
    }
    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding-top: env(safe-area-inset-top);
      padding-bottom: calc(var(--bar) + env(safe-area-inset-bottom) + 24px);
    }

    h1 {
      font-size: 18px;
      text-align: center;
      padding: 14px 16px 10px;
      font-weight: 600;
    }
    h1 .ver { font-size: 11px; color: var(--dim); font-weight: 400; }

    .tabs {
      display: flex;
      margin: 0 16px 12px;
      background: var(--surface);
      border-radius: 10px;
      padding: 3px;
    }
    .tabs button {
      flex: 1;
      border: none;
      background: none;
      color: var(--dim);
      font-size: 14px;
      font-family: inherit;
      padding: 9px 4px;
      border-radius: 8px;
    }
    .tabs button.on {
      background: var(--bg);
      color: var(--text);
      font-weight: 600;
    }

    .body {
      flex: 1;
      padding: 0 16px;
      overflow-y: auto;
    }
    .page { display: none; }
    .page.on { display: block; }

    #status {
      font-size: 14px;
      color: var(--dim);
      padding: 6px 4px 10px;
      margin-bottom: 8px;
      min-height: auto;
    }
    #status.work { color: var(--green); }

    textarea, input {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid #4a4a50;
      border-radius: 10px;
      padding: 14px;
      color: var(--text);
      font-size: 16px;
      font-family: inherit;
    }
    textarea {
      min-height: 160px;
      line-height: 1.5;
      resize: vertical;
    }
    textarea:disabled { opacity: 0.55; }
    textarea::placeholder, input::placeholder { color: #666; }
    input:not(.num-inp) { margin-bottom: 10px; }

    .num-list {
      background: var(--surface);
      border: 1.5px solid #4a4a50;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .num-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      border-bottom: 1px solid #333;
      min-height: 40px;
    }
    .num-row:last-child { border-bottom: none; }
    .num-row.on { background: #1a2a3a; border-left: 3px solid var(--blue); padding-left: 7px; }
    .num-row.called .num-inp {
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .num-mark {
      flex-shrink: 0;
      width: 22px;
      font-size: 14px;
      text-align: center;
      color: var(--dim);
    }
    .num-row.called .num-mark { color: var(--green); }
    .num-row.on .num-mark { color: var(--blue); }
    .num-lbl {
      flex-shrink: 0;
      width: 22px;
      font-size: 13px;
      color: var(--dim);
      text-align: right;
    }
    .num-inp {
      flex: 1;
      border: none !important;
      background: transparent !important;
      padding: 10px 0 !important;
      margin: 0 !important;
      font-size: 16px;
      border-radius: 0 !important;
    }
    .num-inp:disabled { opacity: 0.55; }
    .num-inp:focus { outline: none; }

    .tools {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 10px 0 0;
      font-size: 13px;
      color: var(--dim);
    }
    #p-dial .tools {
      margin: 0 0 28px;
      padding: 8px 0 4px;
    }
    .tools .tool-btns {
      display: flex;
      align-items: center;
      gap: 28px;
    }
    .tools .tool-btns button {
      background: none;
      border: none;
      color: var(--blue);
      font-size: 13px;
      font-family: inherit;
      padding: 6px 0;
    }
    .tools .tool-btns button.red { color: var(--red); }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
      gap: 12px;
    }
    .row:last-child { border-bottom: none; }
    .row b { font-size: 15px; display: block; margin-bottom: 2px; }
    .row small { font-size: 13px; color: var(--dim); }
    .row button {
      flex-shrink: 0;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 14px;
      font-family: inherit;
    }

    .sms-hint {
      font-size: 13px;
      color: var(--dim);
      margin: 10px 0 12px;
      line-height: 1.4;
    }
    .sms-card {
      background: var(--surface);
      border: 1.5px solid #4a4a50;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .sms-card h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
      color: var(--text);
      padding-bottom: 8px;
      border-bottom: 1px solid #3a3a40;
    }
    .sms-text {
      font-size: 15px;
      line-height: 1.5;
      color: var(--text);
      background: var(--bg);
      border: 1px solid #4a4a50;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .sms-card button {
      width: 100%;
      padding: 12px;
      border: 1px solid #3a7fd4;
      border-radius: 10px;
      background: var(--blue);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
    }
    .sms-text.long { max-height: 220px; overflow-y: auto; font-size: 14px; }

    .lang-pick {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }
    .lang-pick button {
      flex: 1;
      padding: 8px 4px;
      border: 1px solid #4a4a50;
      border-radius: 8px;
      background: var(--bg);
      color: var(--dim);
      font-size: 12px;
      font-family: inherit;
    }
    .lang-pick button.on {
      border-color: var(--blue);
      color: var(--text);
      background: #1a2a3a;
    }
    .send-row {
      display: flex;
      gap: 8px;
    }
    .send-row button { flex: 1; }
    .btn-wa {
      background: #25d366 !important;
      border-color: #1faa52 !important;
      color: #fff !important;
    }

    .offer-fields { margin-bottom: 12px; }
    .field-label {
      font-size: 12px;
      color: var(--dim);
      margin: 10px 0 6px;
      display: block;
    }
    .field-label:first-child { margin-top: 0; }
    .offer-fields input.field-inp {
      width: 100%;
      margin-bottom: 0;
      padding: 10px 12px;
      font-size: 15px;
    }
    .lim-pick {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .lim-pick button {
      padding: 8px 10px;
      border: 1px solid #4a4a50;
      border-radius: 8px;
      background: var(--bg);
      color: var(--dim);
      font-size: 13px;
      font-family: inherit;
    }
    .lim-pick button.on {
      border-color: var(--blue);
      color: var(--text);
      background: #1a2a3a;
    }

    .hist {
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
      font-size: 15px;
    }
    .hist span { display: block; font-size: 13px; color: var(--dim); margin-top: 2px; }
    .empty { text-align: center; color: var(--dim); padding: 40px 0; font-size: 14px; }

    .bar {
      position: fixed;
      left: 0; right: 0; bottom: env(safe-area-inset-bottom);
      padding: 14px 16px 16px;
      background: var(--bg);
      border-top: 1px solid var(--line);
    }
    .bar .go {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: var(--green);
      color: #000;
      font-size: 17px;
      font-weight: 600;
      font-family: inherit;
    }
    .bar .stop {
      width: 100%;
      padding: 14px;
      border: 1px solid var(--red);
      border-radius: 10px;
      background: transparent;
      color: var(--red);
      font-size: 16px;
      font-family: inherit;
    }

    .call-active-bar {
      position: fixed;
      left: 0; right: 0;
      bottom: calc(var(--bar) + env(safe-area-inset-bottom));
      padding: 10px 16px;
      background: #1a2a3a;
      border-top: 1px solid var(--blue);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      z-index: 40;
      font-size: 14px;
      color: var(--text);
    }
    .call-active-bar button {
      flex-shrink: 0;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: var(--green);
      color: #000;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
    }

    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.75);
      display: flex; align-items: center; justify-content: center;
      padding: 16px; z-index: 10000;
    }
    .box {
      background: var(--surface);
      border-radius: 14px;
      padding: 22px 18px;
      width: 100%; max-width: 300px;
      text-align: center;
    }
    .box .lbl { font-size: 13px; color: var(--dim); }
    .box .num { font-size: 21px; font-weight: 700; margin: 8px 0 18px; }
    .box .go { width: 100%; margin-top: 8px; padding: 14px; border: none; border-radius: 10px; background: var(--green); color: #000; font-size: 16px; font-weight: 600; font-family: inherit; }
    .box .go.btn-sms { background: var(--blue); color: #fff; }
    .box .go.btn-wa { background: #25d366; color: #fff; }
    .box .skip { width: 100%; margin-top: 8px; padding: 13px; border: 1px solid var(--line); border-radius: 10px; background: none; color: var(--dim); font-size: 15px; font-family: inherit; }
    .box p { font-size: 14px; color: var(--dim); margin: 8px 0 16px; line-height: 1.5; }
    .box-wide { max-width: 340px; text-align: left; }
    .box-wide .num { text-align: center; }
    .send-modal-inner { width: 100%; max-width: 420px; }
    .send-confirm-card { margin-bottom: 0; }
    .send-ask {
      font-size: 14px;
      color: var(--dim);
      margin: 0 0 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid #3a3a40;
    }
    .send-to {
      font-size: 17px;
      font-weight: 700;
      padding: 12px;
      background: var(--bg);
      border: 1px solid #4a4a50;
      border-radius: 10px;
      margin-bottom: 10px;
      text-align: center;
      word-break: break-all;
    }
    .send-to.missing { color: var(--red); font-weight: 600; font-size: 15px; }
    .send-confirm-card .sms-text { margin-bottom: 12px; max-height: 260px; overflow-y: auto; }
    .send-confirm-card .send-row button {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      border: 1px solid #3a7fd4;
      background: var(--blue);
      color: #fff;
    }
    .send-confirm-card .btn-no {
      background: var(--bg) !important;
      border: 1px solid #4a4a50 !important;
      color: var(--dim) !important;
    }
    .send-confirm-card .send-row .btn-wa {
      background: #25d366 !important;
      border-color: #1faa52 !important;
    }
    .hide { display: none !important; }
  </style>
</head>
<body>
  <div class="app">
    <h1>ავტოდაილერი <span class="ver">v35</span></h1>

    <div class="tabs">
      <button class="on" data-v="dial" type="button">დარეკვა</button>
      <button data-v="sms" type="button">SMS</button>
      <button data-v="history" type="button">ისტორია</button>
    </div>

    <div class="body">
      <div id="status">ჩასვი ნომრები და დააჭირე დაწყებას</div>

      <div class="page on" id="p-dial">
        <div class="num-list" id="num-list"></div>
        <div class="tools">
          <span><b id="ncount">0</b> ნომერი</span>
          <div class="tool-btns">
            <button class="red" id="clear" type="button">გასუფთავება</button>
            <button id="paste" type="button">ჩასმა</button>
          </div>
        </div>
      </div>

      <div class="page" id="p-sms">
        <input type="tel" id="sms-num" placeholder="ტელეფონის ნომერი" inputmode="tel">
        <p class="sms-hint">4 შაბლონი: პატარა SMS · არ პასუხობს · ტარიფი · სრული შეთავაზება</p>
        <div id="sms-list"></div>
      </div>

      <div class="page" id="p-history">
        <div class="tools" style="margin-bottom:8px">
          <span>ბოლო ზარები</span>
          <button class="red" id="clr-hist" type="button" style="padding-right:0">გასუფთავება</button>
        </div>
        <div id="hist"><p class="empty">ცარიელია</p></div>
      </div>
    </div>
  </div>

  <div class="call-active-bar hide" id="call-active-bar">
    <span id="call-active-txt">ზარი მიმდინარეობს</span>
    <button id="call-ended" type="button">ზარი დასრულდა</button>
  </div>

  <div class="bar" id="action-bar">
    <button class="go" id="start" type="button">დაწყება</button>
    <button class="stop hide" id="stop" type="button">გაჩერება</button>
  </div>

  <div class="overlay hide" id="after-call-modal">
    <div class="box">
      <div class="lbl">ზარი დასრულდა</div>
      <div class="num" id="after-call-num"></div>
      <p id="after-call-note"></p>
      <button class="go btn-sms" id="after-call-sms" type="button">SMS გაგზავნა</button>
      <button class="go" id="after-call-next" type="button">შემდეგი ნომერი</button>
      <button class="skip" id="after-call-done" type="button">დასრულება</button>
    </div>
  </div>

  <div class="overlay hide" id="send-modal">
    <div class="send-modal-inner">
      <div class="sms-card send-confirm-card">
        <h3 id="send-title">გაგზავნა</h3>
        <p class="send-ask">ნამდვილად გსურთ გაგზავნა?</p>
        <span class="field-label">ნომერი</span>
        <div class="send-to" id="send-num"></div>
        <span class="field-label">ტექსტი</span>
        <div class="sms-text" id="send-preview"></div>
        <div class="send-row">
          <button type="button" class="btn-no" id="send-cancel">არა</button>
          <button type="button" id="send-go">დიახ, SMS</button>
        </div>
      </div>
    </div>
  </div>

  <div class="overlay hide" id="time-modal">
    <div class="box">
      <div class="num">30 წამი გავიდა</div>
      <p>გათიშე ზარი და დაბრუნდი აპში</p>
      <button class="go" id="time-ok" type="button">კარგი</button>
    </div>
  </div>

  <script>
    const INTRO_KA = 'ალექსანდრე ქორჩაშვილი გწერთ სადაზღვეო კომპანია ალდაგიდან. მოინიშნეთ ეს ნომერი და დამიკავშირდით ნებისმიერ კითხვით.';
    const INTRO_EN = 'Aleksandre Korchashvili is writing to you from Aldagi Insurance. Please save this number and contact me if you have any questions.';

    const ALDAGI_HEAD = `რისკები:
ავტოსაგზაო შემთხვევა
ხანძარი | აფეთქება
ვანდალიზმი | ქურდობა | ძარცვა | ყაჩაღობა
სტიქიური მოვლენები
საგნის ვარდნა
დაზიანება დაუდგენელ ვითარებაში
საქარე მინის დაზიანება

დამატებითი რისკები: ორმოში ჩარტყმა, გარეგანი დაზიანება (მოიცავს ყველაფერს რაც ადამიანის ძალით არ არის გამოწვეული)
ტვირთად გადაადგილების დროს დაზიანება.`;

    const ALDAGI_TAIL = `+ ჩანაცვლების სერვისიც შეგვიძლია მოვნიშნოთ (თუ დაგიზიანდებათ ავტომობილი სხვა ავტომობილით ჩაგინაცვლებთ ავტომობილს ჩვენი კომპანია სანამ თქვენი ავტომობილი შეკეთდება)

+ უხეში გაუფრთხილებაც თუ მოვნიშნავთ — თუ წითელზე გაივლით ან bus line-ში ან საპირისპირო ზოლში გადახვალთ, ამ შემთხვევაშიც ანაზღაურდება ზიანი

ბენეფიტები:
ავტოასისტანსის (საწვავის მიტანა, საბურავის შეცვლა, დაბერვა, დაქოქვაში დახმარება) და ევაკუატორის სერვისი უფასოდ საქართველოს 7 დიდ ქალაქში: თბილისი, თელავი, გორი, ქუთაისი, ბათუმი, ფოთი და ზუგდიდი

საჩუქრები:
1. საწვავის ფასდაკლება 20 თთრი
2. 25%-იანი ფასდაკლება "ამბოლში"
3. 20% ფასდაკლება "დელფი მოტორსში" ავტოდითეილინგ მომსახურებაზე
4. 10%-იანი ფასდაკლება ქონების დაზღვევაზე

დეტალურად: https://aldagi.ge/individual/auto-insurance`;

    const OFFER_LIMITS = {
      third: ['5000$', '10000$', '25000$', '50000$'],
      health: ['20000$', '40000$', '100000$']
    };
    const offerPick = { third: '10000$', health: '20000$' };

    const TARIFF_MSG = `გამარჯობა, ალექსანდრე ქორჩაშვილი გწერთ სადაზღვეო კომპანია ალდაგიდან.

ეს მონაცემებია საჭირო ტარიფის დასათვლელად:

1) ავტომობილის მარკა მოდელი
2) გამოშვების წელი
3) ავტომობილს საშუალო საბაზრო ღირებულება
4) მფლობელის ასაკი
5) ყველაზე პატარა მძღოლის ასაკი თქვენს ავტომობილზე
6) რამდენიხანია რაც გყავთ ავტომობილი
7) ძრავის მოცულობა
8) რამდენი ხანია რაც მართვის გამოცდილება გაქვთ`;

    const NO_ANSWER_MSG = `გამარჯობა, ავტომობილის დაზღვევასთან დაკავშირებით გირეკავდით, სადაზღვეო კომპანია ალდაგიდან თუ დაინტერესდებით ამ ნომერზე დამიკავშირდით.`;

    const langPick = { intro: 'ka' };
    const TOUT = 30;
    const S = { q: [], i: 0, run: false, t0: null, ti: null, wait: false, to: false, last: '', called: {} };
    let returnTimer = null;
    const pendingSend = { num: '', msg: '', type: 'sms' };

    const $ = id => document.getElementById(id);
    const st = $('status');

    function setStatus(t, work) {
      st.textContent = t;
      st.classList.toggle('work', !!work);
    }

    function goTab(v) {
      document.querySelectorAll('.tabs button').forEach(x => x.classList.toggle('on', x.dataset.v === v));
      document.querySelectorAll('.page').forEach(x => x.classList.remove('on'));
      $('p-' + v).classList.add('on');
      $('action-bar').classList.toggle('hide', v !== 'dial');
      if (v === 'sms') syncFromDial();
    }

    const NUM_ROWS_START = 5;
    const SHORT_CALL = 6;

    function getNumInputs() {
      return [...$('num-list').querySelectorAll('.num-inp')];
    }

    function getNumsRaw() {
      return getNumInputs().map(i => i.value.trim()).filter(Boolean);
    }

    function getNumsText() {
      return getNumsRaw().join('\n');
    }

    function setNumsFromList(nums) {
      const needed = nums.length ? Math.max(NUM_ROWS_START, nums.length + 1) : NUM_ROWS_START;
      renderNumRows(needed);
      getNumInputs().forEach((inp, i) => { inp.value = nums[i] || ''; });
      onNumsChange();
    }

    function renderNumRows(count, focusIdx) {
      const list = $('num-list');
      const cur = getNumInputs().map(i => i.value);
      const activeIdx = focusIdx ?? getNumInputs().findIndex(i => i === document.activeElement);
      list.innerHTML = '';
      for (let i = 0; i < count; i++) {
        const row = document.createElement('div');
        row.className = 'num-row';
        row.innerHTML = `<span class="num-lbl">${i + 1}.</span><input class="num-inp" type="tel" inputmode="tel" autocomplete="off" spellcheck="false" placeholder="ნომერი"><span class="num-mark"></span>`;
        const inp = row.querySelector('.num-inp');
        inp.value = cur[i] || '';
        list.appendChild(row);
      }
      if (activeIdx >= 0) getNumInputs()[activeIdx]?.focus();
      markNumRows();
    }

    function normNum(n) {
      return tel((n || '').trim().replace(/[\s\-()]/g, ''));
    }

    function markNumRows() {
      $('num-list').querySelectorAll('.num-row').forEach(row => {
        const inp = row.querySelector('.num-inp');
        const st = S.called[normNum(inp?.value || '')];
        row.classList.toggle('on', st === 'active');
        row.classList.toggle('called', st === 'called');
        const mark = row.querySelector('.num-mark');
        if (mark) mark.textContent = st === 'called' ? '✓' : st === 'active' ? '→' : '';
      });
    }

    function addNextRow(focusIdx) {
      renderNumRows(getNumInputs().length + 1, focusIdx);
    }

    function maybeAddRowOnInput(inp) {
      const inputs = getNumInputs();
      const i = inputs.indexOf(inp);
      if (i === inputs.length - 1 && inp.value.trim()) addNextRow(i);
    }

    function setNumsDisabled(on) {
      getNumInputs().forEach(i => { i.disabled = on; });
    }

    function highlightNumRow(idx) {
      if (S.run && idx >= 0 && S.q[idx]) S.called[normNum(S.q[idx])] = 'active';
      markNumRows();
    }

    function onNumsChange() {
      count();
      syncFromDial();
      saveNums();
    }

    function filterPhoneInput(inp) {
      inp.value = inp.value.replace(/[^\d+\s\-()]/g, '');
    }

    function initNumList() {
      renderNumRows(NUM_ROWS_START);
      $('num-list').addEventListener('input', e => {
        const inp = e.target.closest('.num-inp');
        if (!inp) return;
        filterPhoneInput(inp);
        maybeAddRowOnInput(inp);
        onNumsChange();
      });
      $('num-list').addEventListener('keydown', e => {
        const inp = e.target.closest('.num-inp');
        if (!inp || e.key !== 'Enter') return;
        e.preventDefault();
        const inputs = getNumInputs();
        const i = inputs.indexOf(inp);
        if (i < 0) return;
        if (i < inputs.length - 1) {
          inputs[i + 1].focus();
        } else {
          addNextRow();
          getNumInputs()[i + 1]?.focus();
        }
      });
    }

    function firstNumFromText() {
      const parsed = parse(getNumsText());
      if (parsed[0]) return parsed[0];
      return getNumsRaw()[0] || '';
    }

    function getDialNum() {
      if (S.run && S.q[S.i]) return S.q[S.i];
      const fromText = firstNumFromText();
      if (fromText) return fromText;
      return S.last || '';
    }

    function syncFromDial() {
      syncSmsNum(getDialNum());
    }

    function syncSmsNum(n) {
      const v = (n || '').trim();
      if (v) S.last = v;
      $('sms-num').value = v;
    }

    document.querySelectorAll('.tabs button').forEach(b => b.onclick = () => goTab(b.dataset.v));

    function parse(t) {
      return t.split(/[\n,;]+/).map(n => n.trim().replace(/[\s\-()]/g, ''))
        .filter(n => n.replace(/\D/g, '').length >= 9)
        .filter((n, i, a) => a.indexOf(n) === i);
    }
    function tel(n) { return n.replace(/[^\d+]/g, ''); }
    function count() { $('ncount').textContent = parse(getNumsText()).length; }

    function hist() {
      try { return JSON.parse(localStorage.getItem('hist') || '[]'); } catch { return []; }
    }
    function addHist(num, note) {
      const h = hist();
      h.unshift({ num, note, t: new Date().toLocaleString('ka-GE', { hour: '2-digit', minute: '2-digit' }) });
      localStorage.setItem('hist', JSON.stringify(h.slice(0, 50)));
      showHist();
    }
    function showHist() {
      const h = hist();
      $('hist').innerHTML = h.length
        ? h.map(x => `<div class="hist">${x.num}<span>${x.note} · ${x.t}</span></div>`).join('')
        : '<p class="empty">ცარიელია</p>';
    }

    function callElapsed() {
      return S.t0 ? (Date.now() - S.t0) / 1000 : 0;
    }

    function timer(on) {
      clearInterval(S.ti);
      if (!on) return;
      S.t0 = Date.now(); S.to = false;
      S.ti = setInterval(() => {
        const sec = callElapsed();
        const left = TOUT - sec;
        if (left > 0) setStatus(`ირეკება ${S.i + 1}/${S.q.length} · ${S.q[S.i]} · ${Math.ceil(left)} წმ`, true);
        else if (!S.to) {
          S.to = true;
          if (sec < SHORT_CALL) $('time-modal').classList.remove('hide');
          else if (S.wait) showCallActiveBar();
        }
      }, 500);
    }

    function dial(n) { location.href = 'tel:' + tel(n); }

    function start() {
      S.q = parse(getNumsText());
      if (!S.q.length) { setStatus('შეიყვანე ნომერი'); return; }
      S.i = 0; S.run = true; S.called = {};
      $('start').classList.add('hide');
      $('stop').classList.remove('hide');
      setNumsDisabled(true);
      highlightNumRow(0);
      saveNums();
      call();
    }

    function applyPaste(pasted) {
      if (!pasted) return;
      const existing = getNumsRaw();
      const incoming = pasted.split(/[\n,;]+/).map(l => l.trim()).filter(Boolean);
      const merged = [...existing, ...incoming];
      const rows = Math.max(NUM_ROWS_START, merged.length + 1);
      renderNumRows(rows);
      getNumInputs().forEach((inp, i) => { inp.value = merged[i] || ''; });
      onNumsChange();
      setStatus('ჩასმულია');
    }

    function call() {
      if (!S.run || S.i >= S.q.length) { done(); return; }
      S.wait = true;
      highlightNumRow(S.i);
      syncSmsNum(S.q[S.i]);
      timer(true);
      dial(S.q[S.i]);
    }

    function showCallActiveBar() {
      $('call-active-txt').textContent = `ზარი მიმდინარეობს: ${S.q[S.i]}`;
      $('call-active-bar').classList.remove('hide');
      setStatus(`ირეკება: ${S.q[S.i]} · ზარი მიმდინარეობს`, true);
    }

    function hideCallActiveBar() {
      $('call-active-bar').classList.add('hide');
    }

    function onAppVisible() {
      if (!S.run || !S.wait) return;
      clearTimeout(returnTimer);
      const elapsed = callElapsed();
      if (elapsed < SHORT_CALL) {
        returnTimer = setTimeout(() => {
          if (S.wait && document.visibilityState === 'visible') returned(true);
        }, 1000);
      } else {
        showCallActiveBar();
      }
    }

    function returned(isAuto) {
      if (!S.run || !S.wait) return;
      const sec = callElapsed();
      if (isAuto && sec >= SHORT_CALL) return;
      clearTimeout(returnTimer);
      hideCallActiveBar();
      S.wait = false;
      timer(false);
      const n = S.q[S.i];
      const ok = !isAuto && sec > 5;
      S.called[normNum(n)] = 'called';
      markNumRows();
      syncSmsNum(n);
      addHist(n, ok ? 'მიპასუხეს' : 'არ მიპასუხეს');
      setStatus(ok ? `${n} — მიპასუხეს` : `${n} — არ მიპასუხეს`);
      S.i++;
      if (S.run) {
        if (isAuto) showAfterCall(n, false);
        else showAfterCall(n, ok);
      }
    }

    function goNextCall() {
      $('after-call-modal').classList.add('hide');
      if (S.run && S.i < S.q.length) call();
      else done();
    }

    function reset() {
      $('start').classList.remove('hide');
      $('stop').classList.add('hide');
      setNumsDisabled(false);
      hideCallActiveBar();
      markNumRows();
      $('after-call-modal').classList.add('hide');
      $('time-modal').classList.add('hide');
    }

    function done() {
      S.run = false; S.wait = false;
      timer(false); reset();
      syncFromDial();
      setStatus('დასრულდა ✓');
    }

    function stopAll() {
      S.run = false; S.wait = false;
      clearTimeout(returnTimer);
      timer(false); reset();
      setStatus('გაჩერებულია');
    }

    function getPhone() {
      return tel($('sms-num').value || getDialNum());
    }

    function introMsg(lang) {
      if (lang === 'en') return INTRO_EN;
      if (lang === 'both') return INTRO_KA + '\n\n' + INTRO_EN;
      return INTRO_KA;
    }

    function sendSmsTo(num, msg) {
      location.href = 'sms:' + num + '?body=' + encodeURIComponent(msg);
    }

    function sendWaTo(num, msg) {
      const n = num.replace(/\D/g, '');
      location.href = 'https://wa.me/' + n + '?text=' + encodeURIComponent(msg);
    }

    function showSendConfirm(num, msg, type, title) {
      pendingSend.num = num || '';
      pendingSend.msg = msg;
      pendingSend.type = type;
      $('send-title').textContent = title || 'გაგზავნა';
      const numEl = $('send-num');
      if (num) {
        numEl.textContent = num;
        numEl.classList.remove('missing');
      } else {
        numEl.textContent = 'ნომერი არ არის — შეიყვანე ზემოთ';
        numEl.classList.add('missing');
      }
      $('send-preview').textContent = msg;
      const btn = $('send-go');
      btn.textContent = type === 'wa' ? 'დიახ, WhatsApp' : 'დიახ, SMS';
      btn.className = type === 'wa' ? 'btn-wa' : '';
      $('send-modal').classList.remove('hide');
      document.body.style.overflow = 'hidden';
    }

    function closeSendModal() {
      $('send-modal').classList.add('hide');
      document.body.style.overflow = '';
    }

    function confirmSend() {
      if (!pendingSend.num) {
        $('send-num').textContent = 'შეიყვანე ტელეფონის ნომერი!';
        $('send-num').classList.add('missing');
        return;
      }
      const num = pendingSend.num;
      const msg = pendingSend.msg;
      const type = pendingSend.type;
      closeSendModal();
      if (type === 'wa') sendWaTo(num, msg);
      else sendSmsTo(num, msg);
    }

    function openSendFromBtn(btn) {
      const card = btn.closest('.sms-card');
      const title = card?.querySelector('h3')?.textContent || 'გაგზავნა';
      const n = getPhone();
      const action = btn.dataset.send;
      if (action === 'intro-sms') showSendConfirm(n, introMsg(langPick.intro), 'sms', title);
      else if (action === 'noanswer-sms') showSendConfirm(n, NO_ANSWER_MSG, 'sms', title);
      else if (action === 'noanswer-wa') showSendConfirm(n, NO_ANSWER_MSG, 'wa', title);
      else if (action === 'tariff-sms') showSendConfirm(n, TARIFF_MSG, 'sms', title);
      else if (action === 'tariff-wa') showSendConfirm(n, TARIFF_MSG, 'wa', title);
      else if (action === 'aldagi-sms') showSendConfirm(n, buildAldagiMsg(), 'sms', title);
      else if (action === 'aldagi-wa') showSendConfirm(n, buildAldagiMsg(), 'wa', title);
    }

    function showAfterCall(n, answered) {
      $('after-call-num').textContent = n;
      $('after-call-note').textContent = answered ? 'მიპასუხეს' : 'არ მიპასუხეს';
      const hasNext = S.run && S.i < S.q.length;
      $('after-call-next').classList.toggle('hide', !hasNext);
      $('after-call-done').classList.toggle('hide', hasNext);
      if (hasNext) $('after-call-next').textContent = `შემდეგი ნომერი (${S.i + 1}/${S.q.length})`;
      $('after-call-modal').classList.remove('hide');
    }

    function renderSmsList() {
      let html = `
        <div class="sms-card" data-id="intro">
          <h3>პატარა SMS-ის დატოვება</h3>
          <div class="lang-pick">
            <button type="button" class="on" data-lang="ka">ქართული</button>
            <button type="button" data-lang="en">ინგლისური</button>
            <button type="button" data-lang="both">ორივე</button>
          </div>
          <div class="sms-text" id="intro-preview">${introMsg('ka')}</div>
          <button type="button" data-send="intro-sms">გაგზავნა SMS</button>
        </div>
        <div class="sms-card" data-id="noanswer">
          <h3>არ პასუხობს</h3>
          <div class="sms-text">${NO_ANSWER_MSG.replace(/</g, '&lt;')}</div>
          <div class="send-row">
            <button type="button" data-send="noanswer-sms">SMS</button>
            <button type="button" class="btn-wa" data-send="noanswer-wa">WhatsApp</button>
          </div>
        </div>
        <div class="sms-card" data-id="tariff">
          <h3>ტარიფის დაანგარიშება</h3>
          <div class="sms-text">${TARIFF_MSG.replace(/</g, '&lt;')}</div>
          <div class="send-row">
            <button type="button" data-send="tariff-sms">SMS</button>
            <button type="button" class="btn-wa" data-send="tariff-wa">WhatsApp</button>
          </div>
        </div>
        <div class="sms-card" data-id="aldagi">
          <h3>სრული შეთავაზება</h3>
          <div class="offer-fields">
            <span class="field-label">ტარიფი ($)</span>
            <input class="field-inp" id="offer-tariff" type="text" inputmode="decimal" placeholder="მაგ: 150$">
            <span class="field-label">ავტომობილი ($)</span>
            <input class="field-inp" id="offer-car" type="text" inputmode="decimal" placeholder="მაგ: 10000$">
            <span class="field-label">მესამე პირი</span>
            <div class="lim-pick" id="offer-third">
              ${OFFER_LIMITS.third.map(v => `<button type="button" data-k="third" data-val="${v}" class="${v === offerPick.third ? 'on' : ''}">${v}</button>`).join('')}
            </div>
            <span class="field-label">მძღოლისა და მგზავრების ჯანმრთელობა</span>
            <div class="lim-pick" id="offer-health">
              ${OFFER_LIMITS.health.map(v => `<button type="button" data-k="health" data-val="${v}" class="${v === offerPick.health ? 'on' : ''}">${v}</button>`).join('')}
            </div>
          </div>
          <div class="sms-text long" id="aldagi-preview"></div>
          <div class="send-row">
            <button type="button" data-send="aldagi-sms">SMS</button>
            <button type="button" class="btn-wa" data-send="aldagi-wa">WhatsApp</button>
          </div>
        </div>`;

      $('sms-list').innerHTML = html;
      updateAldagiPreview();
    }

    function formatUsd(val) {
      const v = val.trim();
      if (!v) return '—';
      if (v.includes('$')) return v;
      return v + '$';
    }

    function buildAldagiMsg() {
      const tariff = formatUsd($('offer-tariff')?.value || '');
      const car = formatUsd($('offer-car')?.value || '');
      return `${ALDAGI_HEAD}

ტარიფი: ${tariff}
ავტომობილი: ${car}
მესამე პირი: ${offerPick.third}
მძღოლისა და მგზავრების ჯანმრთელობა: ${offerPick.health}

${ALDAGI_TAIL}`;
    }

    function updateAldagiPreview() {
      const el = $('aldagi-preview');
      if (el) el.textContent = buildAldagiMsg();
    }

    function initOfferFields() {
      $('offer-tariff')?.addEventListener('input', updateAldagiPreview);
      $('offer-car')?.addEventListener('input', updateAldagiPreview);
      document.querySelectorAll('.lim-pick button').forEach(b => {
        b.onclick = () => {
          const k = b.dataset.k;
          offerPick[k] = b.dataset.val;
          b.parentElement.querySelectorAll('button').forEach(x => x.classList.toggle('on', x === b));
          updateAldagiPreview();
        };
      });
    }

    $('sms-list').addEventListener('click', e => {
      const langBtn = e.target.closest('[data-lang]');
      if (langBtn) {
        const card = langBtn.closest('[data-id="intro"]');
        card.querySelectorAll('[data-lang]').forEach(b => b.classList.toggle('on', b === langBtn));
        langPick.intro = langBtn.dataset.lang;
        $('intro-preview').textContent = introMsg(langPick.intro);
        return;
      }

      const btn = e.target.closest('[data-send]');
      if (!btn) return;
      e.preventDefault();
      e.stopPropagation();
      syncFromDial();
      openSendFromBtn(btn);
    });

    renderSmsList();
    initOfferFields();
    initNumList();

    $('start').onclick = start;
    $('stop').onclick = stopAll;
    $('after-call-sms').onclick = () => showSendConfirm($('after-call-num').textContent, NO_ANSWER_MSG, 'sms', 'არ პასუხობს');
    $('after-call-next').onclick = goNextCall;
    $('after-call-done').onclick = () => { $('after-call-modal').classList.add('hide'); done(); };
    $('send-go').onclick = confirmSend;
    $('send-cancel').onclick = closeSendModal;
    $('send-modal').onclick = e => { if (e.target === $('send-modal')) closeSendModal(); };
    $('call-ended').onclick = () => returned(false);
    $('time-ok').onclick = () => $('time-modal').classList.add('hide');
    function saveNums() {
      localStorage.setItem('nums', getNumsText());
    }

    $('paste').onclick = async () => {
      try {
        const t = await navigator.clipboard.readText();
        if (t) applyPaste(t);
      } catch { setStatus('ჩასმა ვერ მოხერხდა'); }
    };
    $('clear').onclick = () => {
      S.called = {};
      setNumsFromList([]);
      syncSmsNum('');
      localStorage.removeItem('nums');
    };
    $('clr-hist').onclick = () => { localStorage.removeItem('hist'); showHist(); };

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') {
        clearTimeout(returnTimer);
        hideCallActiveBar();
      } else {
        onAppVisible();
      }
    });
    window.addEventListener('pageshow', e => { if (e.persisted) onAppVisible(); });
    if ('serviceWorker' in navigator) navigator.serviceWorker.getRegistrations().then(r => r.forEach(x => x.unregister()));

    const saved = localStorage.getItem('nums');
    if (saved) setNumsFromList(saved.split(/[\n,;]+/).map(l => l.trim()).filter(Boolean));
    else count();
    syncFromDial();
    showHist();
  </script>
</body>
</html>
