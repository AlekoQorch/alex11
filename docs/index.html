<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ავტოდაილერი">
  <meta name="theme-color" content="#161618">
  <meta name="color-scheme" content="dark">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>ავტოდაილერი</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #161618;
      --surface: #222224;
      --line: #333;
      --text: #ececec;
      --dim: #999;
      --blue: #4d9fff;
      --green: #32d74b;
      --red: #ff453a;
      --bar: 64px;
    }
    body {
      font-family: -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      line-height: 1.45;
      min-height: 100dvh;
    }
    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding-top: env(safe-area-inset-top);
      padding-bottom: calc(var(--bar) + env(safe-area-inset-bottom) + 8px);
    }

    h1 {
      font-size: 18px;
      text-align: center;
      padding: 14px 16px 10px;
      font-weight: 600;
    }

    .tabs {
      display: flex;
      margin: 0 16px 12px;
      background: var(--surface);
      border-radius: 10px;
      padding: 3px;
    }
    .tabs button {
      flex: 1;
      border: none;
      background: none;
      color: var(--dim);
      font-size: 14px;
      font-family: inherit;
      padding: 9px 4px;
      border-radius: 8px;
    }
    .tabs button.on {
      background: var(--bg);
      color: var(--text);
      font-weight: 600;
    }

    .body {
      flex: 1;
      padding: 0 16px;
      overflow-y: auto;
    }
    .page { display: none; }
    .page.on { display: block; }

    #status {
      font-size: 14px;
      color: var(--dim);
      padding: 10px 12px;
      background: var(--surface);
      border: 1.5px solid #4a4a50;
      border-radius: 10px;
      margin-bottom: 12px;
      min-height: 42px;
    }
    #status.work { color: var(--green); }

    textarea, input {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid #4a4a50;
      border-radius: 10px;
      padding: 14px;
      color: var(--text);
      font-size: 16px;
      font-family: inherit;
    }
    textarea {
      min-height: 160px;
      line-height: 1.5;
      resize: vertical;
    }
    textarea:disabled { opacity: 0.55; }
    textarea::placeholder, input::placeholder { color: #666; }
    input { margin-bottom: 10px; }

    .tools {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 10px 0 0;
      font-size: 13px;
      color: var(--dim);
    }
    .tools div button {
      background: none;
      border: none;
      color: var(--blue);
      font-size: 13px;
      font-family: inherit;
      padding: 6px 0 6px 12px;
    }
    .tools div button.red { color: var(--red); }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
      gap: 12px;
    }
    .row:last-child { border-bottom: none; }
    .row b { font-size: 15px; display: block; margin-bottom: 2px; }
    .row small { font-size: 13px; color: var(--dim); }
    .row button {
      flex-shrink: 0;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 14px;
      font-family: inherit;
    }

    .sms-hint {
      font-size: 13px;
      color: var(--dim);
      margin: 10px 0 12px;
      line-height: 1.4;
    }
    .sms-card {
      background: var(--surface);
      border: 1.5px solid #4a4a50;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .sms-card h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
      color: var(--text);
      padding-bottom: 8px;
      border-bottom: 1px solid #3a3a40;
    }
    .sms-text {
      font-size: 15px;
      line-height: 1.5;
      color: var(--text);
      background: var(--bg);
      border: 1px solid #4a4a50;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .sms-card button {
      width: 100%;
      padding: 12px;
      border: 1px solid #3a7fd4;
      border-radius: 10px;
      background: var(--blue);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
    }
    .sms-text.long { max-height: 220px; overflow-y: auto; font-size: 14px; }

    .lang-pick {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }
    .lang-pick button {
      flex: 1;
      padding: 8px 4px;
      border: 1px solid #4a4a50;
      border-radius: 8px;
      background: var(--bg);
      color: var(--dim);
      font-size: 12px;
      font-family: inherit;
    }
    .lang-pick button.on {
      border-color: var(--blue);
      color: var(--text);
      background: #1a2a3a;
    }
    .send-row {
      display: flex;
      gap: 8px;
    }
    .send-row button { flex: 1; }
    .btn-wa {
      background: #25d366 !important;
      border-color: #1faa52 !important;
      color: #fff !important;
    }

    .hist {
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
      font-size: 15px;
    }
    .hist span { display: block; font-size: 13px; color: var(--dim); margin-top: 2px; }
    .empty { text-align: center; color: var(--dim); padding: 40px 0; font-size: 14px; }

    .bar {
      position: fixed;
      left: 0; right: 0; bottom: env(safe-area-inset-bottom);
      padding: 10px 16px;
      background: var(--bg);
      border-top: 1px solid var(--line);
    }
    .bar .go {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: var(--green);
      color: #000;
      font-size: 17px;
      font-weight: 600;
      font-family: inherit;
    }
    .bar .stop {
      width: 100%;
      padding: 14px;
      border: 1px solid var(--red);
      border-radius: 10px;
      background: transparent;
      color: var(--red);
      font-size: 16px;
      font-family: inherit;
    }

    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.65);
      display: flex; align-items: center; justify-content: center;
      padding: 20px; z-index: 50;
    }
    .box {
      background: var(--surface);
      border-radius: 14px;
      padding: 22px 18px;
      width: 100%; max-width: 300px;
      text-align: center;
    }
    .box .lbl { font-size: 13px; color: var(--dim); }
    .box .num { font-size: 21px; font-weight: 700; margin: 8px 0 18px; }
    .box .go { width: 100%; margin-top: 8px; padding: 14px; border: none; border-radius: 10px; background: var(--green); color: #000; font-size: 16px; font-weight: 600; font-family: inherit; }
    .box .skip { width: 100%; margin-top: 8px; padding: 13px; border: 1px solid var(--line); border-radius: 10px; background: none; color: var(--dim); font-size: 15px; font-family: inherit; }
    .box p { font-size: 14px; color: var(--dim); margin: 8px 0 16px; line-height: 1.5; }
    .hide { display: none !important; }
  </style>
</head>
<body>
  <div class="app">
    <h1>ავტოდაილერი</h1>

    <div class="tabs">
      <button class="on" data-v="dial" type="button">დარეკვა</button>
      <button data-v="sms" type="button">SMS</button>
      <button data-v="history" type="button">ისტორია</button>
    </div>

    <div class="body">
      <div id="status">ჩასვი ნომრები და დააჭირე დაწყებას</div>

      <div class="page on" id="p-dial">
        <textarea id="nums" placeholder="თითო ხაზზე ერთი ნომერი"></textarea>
        <div class="tools">
          <span><b id="ncount">0</b> ნომერი</span>
          <div>
            <button id="paste" type="button">ჩასმა</button>
            <button class="red" id="clear" type="button">გასუფთავება</button>
          </div>
        </div>
      </div>

      <div class="page" id="p-sms">
        <input type="tel" id="sms-num" placeholder="ტელეფონის ნომერი" inputmode="tel">
        <p class="sms-hint">4 შაბლონი: პატარა SMS · მომწერეთ · ტარიფი · სრული შეთავაზება</p>
        <div id="sms-list"></div>
      </div>

      <div class="page" id="p-history">
        <div class="tools" style="margin-bottom:8px">
          <span>ბოლო ზარები</span>
          <button class="red" id="clr-hist" type="button" style="padding-right:0">გასუფთავება</button>
        </div>
        <div id="hist"><p class="empty">ცარიელია</p></div>
      </div>
    </div>
  </div>

  <div class="bar" id="action-bar">
    <button class="go" id="start" type="button">დაწყება</button>
    <button class="stop hide" id="stop" type="button">გაჩერება</button>
  </div>

  <div class="overlay hide" id="next-modal">
    <div class="box">
      <div class="lbl" id="next-lbl">შემდეგი</div>
      <div class="num" id="next-num"></div>
      <button class="go" id="next-go" type="button">დარეკვა</button>
      <button class="skip" id="next-skip" type="button">გამოტოვება</button>
    </div>
  </div>

  <div class="overlay hide" id="time-modal">
    <div class="box">
      <div class="num">30 წამი გავიდა</div>
      <p>გათიშე ზარი და დაბრუნდი აპში</p>
      <button class="go" id="time-ok" type="button">კარგი</button>
    </div>
  </div>

  <script>
    const INTRO_KA = 'ალექსანდრე ქორჩაშვილი გწერთ სადაზღვეო კომპანია ალდაგიდან. მოინიშნეთ ეს ნომერი და დამიკავშირდით ნებისმიერ კითხვით.';
    const INTRO_EN = 'Aleksandre Korchashvili is writing to you from Aldagi Insurance. Please save this number and contact me if you have any questions.';

    const ALDAGI_INFO = `რისკები:
ავტოსაგზაო შემთხვევა
ხანძარი | აფეთქება
ვანდალიზმი | ქურდობა | ძარცვა | ყაჩაღობა
სტიქიური მოვლენები
საგნის ვარდნა
დაზიანება დაუდგენელ ვითარებაში
საქარე მინის დაზიანება

დამატებითი რისკები: ორმოში ჩარტყმა, გარეგანი დაზიანება (მოიცავს ყველაფერს რაც ადამიანის ძალით არ არის გამოწვეული)
ტვირთად გადაადგილების დროს დაზიანება.

ტარიფი:
ავტომობილი:
მესამე პირი:
მძღოლისა და მგზავრების ჯანმრთელობა:

+ ჩანაცვლების სერვისიც შეგვიძლია მოვნიშნოთ (თუ დაგიზიანდებათ ავტომობილი სხვა ავტომობილით ჩაგინაცვლებთ ავტომობილს ჩვენი კომპანია სანამ თქვენი ავტომობილი შეკეთდება)

+ უხეში გაუფრთხილებაც თუ მოვნიშნავთ — თუ წითელზე გაივლით ან bus line-ში ან საპირისპირო ზოლში გადახვალთ, ამ შემთხვევაშიც ანაზღაურდება ზიანი

ბენეფიტები:
ავტოასისტანსის (საწვავის მიტანა, საბურავის შეცვლა, დაბერვა, დაქოქვაში დახმარება) და ევაკუატორის სერვისი უფასოდ საქართველოს 7 დიდ ქალაქში: თბილისი, თელავი, გორი, ქუთაისი, ბათუმი, ფოთი და ზუგდიდი

საჩუქრები:
1. საწვავის ფასდაკლება 20 თთრი
2. 25%-იანი ფასდაკლება "ამბოლში"
3. 20% ფასდაკლება "დელფი მოტორსში" ავტოდითეილინგ მომსახურებაზე
4. 10%-იანი ფასდაკლება ქონების დაზღვევაზე

დეტალურად: https://aldagi.ge/individual/auto-insurance`;

    const TARIFF_MSG = `გამარჯობა, ალექსანდრე ქორჩაშვილი გწერთ სადაზღვეო კომპანია ალდაგიდან.

ეს მონაცემებია საჭირო ტარიფის დასათვლელად:

1) ავტომობილის მარკა მოდელი
2) გამოშვების წელი
3) ავტომობილს საშუალო საბაზრო ღირებულება
4) მფლობელის ასაკი
5) ყველაზე პატარა მძღოლის ასაკი თქვენს ავტომობილზე
6) რამდენიხანია რაც გყავთ ავტომობილი
7) ძრავის მოცულობა
8) რამდენი ხანია რაც მართვის გამოცდილება გაქვთ`;

    const NO_ANSWER_MSG = `გამარჯობა, ავტომობილის დაზღვევასთან დაკავშირებით გირეკავდით, სადაზღვეო კომპანია ალდაგიდან. თუ დაინტერესდებით ამ ნომერზე დამიკავშირდით.`;

    const langPick = { intro: 'ka' };
    const TOUT = 30;
    const S = { q: [], i: 0, run: false, t0: null, ti: null, wait: false, to: false };

    const $ = id => document.getElementById(id);
    const st = $('status');

    function setStatus(t, work) {
      st.textContent = t;
      st.classList.toggle('work', !!work);
    }

    function goTab(v) {
      document.querySelectorAll('.tabs button').forEach(x => x.classList.toggle('on', x.dataset.v === v));
      document.querySelectorAll('.page').forEach(x => x.classList.remove('on'));
      $('p-' + v).classList.add('on');
      $('action-bar').classList.toggle('hide', v !== 'dial');
    }

    document.querySelectorAll('.tabs button').forEach(b => b.onclick = () => goTab(b.dataset.v));

    function parse(t) {
      return t.split(/[\n,;]+/).map(n => n.trim().replace(/[\s\-()]/g, ''))
        .filter(n => n.replace(/\D/g, '').length >= 9)
        .filter((n, i, a) => a.indexOf(n) === i);
    }
    function tel(n) { return n.replace(/[^\d+]/g, ''); }
    function count() { $('ncount').textContent = parse($('nums').value).length; }

    function hist() {
      try { return JSON.parse(localStorage.getItem('hist') || '[]'); } catch { return []; }
    }
    function addHist(num, note) {
      const h = hist();
      h.unshift({ num, note, t: new Date().toLocaleString('ka-GE', { hour: '2-digit', minute: '2-digit' }) });
      localStorage.setItem('hist', JSON.stringify(h.slice(0, 50)));
      showHist();
    }
    function showHist() {
      const h = hist();
      $('hist').innerHTML = h.length
        ? h.map(x => `<div class="hist">${x.num}<span>${x.note} · ${x.t}</span></div>`).join('')
        : '<p class="empty">ცარიელია</p>';
    }

    function timer(on) {
      clearInterval(S.ti);
      if (!on) return;
      S.t0 = Date.now(); S.to = false;
      S.ti = setInterval(() => {
        const left = TOUT - (Date.now() - S.t0) / 1000;
        if (left > 0) setStatus(`ირეკება ${S.i + 1}/${S.q.length} · ${S.q[S.i]} · ${Math.ceil(left)} წმ`, true);
        else if (!S.to) { S.to = true; $('time-modal').classList.remove('hide'); }
      }, 500);
    }

    function dial(n) { location.href = 'tel:' + tel(n); }

    function start() {
      S.q = parse($('nums').value);
      if (!S.q.length) { setStatus('შეიყვანე ნომერი'); return; }
      S.i = 0; S.run = true;
      $('start').classList.add('hide');
      $('stop').classList.remove('hide');
      $('nums').disabled = true;
      localStorage.setItem('nums', $('nums').value);
      call();
    }

    function call() {
      if (!S.run || S.i >= S.q.length) { done(); return; }
      S.wait = true;
      timer(true);
      dial(S.q[S.i]);
    }

    function returned() {
      if (!S.run || !S.wait) return;
      S.wait = false;
      timer(false);
      const n = S.q[S.i];
      const sec = S.t0 ? (Date.now() - S.t0) / 1000 : 0;
      const ok = sec > 8 && sec < TOUT;
      addHist(n, ok ? 'მიპასუხეს' : 'არ მიპასუხეს');
      setStatus(ok ? `${n} — მიპასუხეს` : `${n} — არ მიპასუხეს`);
      S.i++;
      if (S.run && S.i < S.q.length) {
        $('next-num').textContent = S.q[S.i];
        $('next-lbl').textContent = `შემდეგი (${S.i + 1}/${S.q.length})`;
        $('next-modal').classList.remove('hide');
        clearTimeout($('next-modal')._t);
        $('next-modal')._t = setTimeout(next, 3000);
      } else if (S.run) done();
    }

    function next() {
      $('next-modal').classList.add('hide');
      clearTimeout($('next-modal')._t);
      if (S.run) call();
    }

    function reset() {
      $('start').classList.remove('hide');
      $('stop').classList.add('hide');
      $('nums').disabled = false;
      $('next-modal').classList.add('hide');
      $('time-modal').classList.add('hide');
    }

    function done() {
      S.run = false; S.wait = false;
      timer(false); reset();
      setStatus('დასრულდა ✓');
    }

    function stopAll() {
      S.run = false; S.wait = false;
      timer(false); reset();
      setStatus('გაჩერებულია');
    }

    function getPhone() {
      return tel($('sms-num').value || $('nums').value.split('\n').find(l => l.trim()) || '');
    }

    function introMsg(lang) {
      if (lang === 'en') return INTRO_EN;
      if (lang === 'both') return INTRO_KA + '\n\n' + INTRO_EN;
      return INTRO_KA;
    }

    function sendSmsTo(num, msg) {
      location.href = 'sms:' + num + '?body=' + encodeURIComponent(msg);
    }

    function sendWaTo(num, msg) {
      const n = num.replace(/\D/g, '');
      location.href = 'https://wa.me/' + n + '?text=' + encodeURIComponent(msg);
    }

    function renderSmsList() {
      let html = `
        <div class="sms-card" data-id="intro">
          <h3>პატარა SMS-ის დატოვება</h3>
          <div class="lang-pick">
            <button type="button" class="on" data-lang="ka">ქართული</button>
            <button type="button" data-lang="en">ინგლისური</button>
            <button type="button" data-lang="both">ორივე</button>
          </div>
          <div class="sms-text" id="intro-preview">${introMsg('ka')}</div>
          <button type="button" data-send="intro-sms">გაგზავნა SMS</button>
        </div>
        <div class="sms-card" data-id="noanswer">
          <h3>არ პასუხობს</h3>
          <div class="sms-text">${NO_ANSWER_MSG.replace(/</g, '&lt;')}</div>
          <div class="send-row">
            <button type="button" data-send="noanswer-sms">SMS</button>
            <button type="button" class="btn-wa" data-send="noanswer-wa">WhatsApp</button>
          </div>
        </div>
        <div class="sms-card" data-id="tariff">
          <h3>ტარიფის დაანგარიშება</h3>
          <div class="sms-text">${TARIFF_MSG.replace(/</g, '&lt;')}</div>
          <div class="send-row">
            <button type="button" data-send="tariff-sms">SMS</button>
            <button type="button" class="btn-wa" data-send="tariff-wa">WhatsApp</button>
          </div>
        </div>
        <div class="sms-card" data-id="aldagi">
          <h3>სრული შეთავაზება</h3>
          <div class="sms-text long">${ALDAGI_INFO.replace(/</g, '&lt;')}</div>
          <div class="send-row">
            <button type="button" data-send="aldagi-sms">SMS</button>
            <button type="button" class="btn-wa" data-send="aldagi-wa">WhatsApp</button>
          </div>
        </div>`;

      $('sms-list').innerHTML = html;
    }

    $('sms-list').onclick = e => {
      const langBtn = e.target.closest('[data-lang]');
      if (langBtn) {
        const card = langBtn.closest('[data-id="intro"]');
        card.querySelectorAll('[data-lang]').forEach(b => b.classList.toggle('on', b === langBtn));
        langPick.intro = langBtn.dataset.lang;
        $('intro-preview').textContent = introMsg(langPick.intro);
        return;
      }

      const btn = e.target.closest('[data-send]');
      if (!btn) return;
      const n = getPhone();
      if (!n) { setStatus('მიუთითე ნომერი'); goTab('sms'); return; }

      const action = btn.dataset.send;
      if (action === 'intro-sms') sendSmsTo(n, introMsg(langPick.intro));
      else if (action === 'noanswer-sms') sendSmsTo(n, NO_ANSWER_MSG);
      else if (action === 'noanswer-wa') sendWaTo(n, NO_ANSWER_MSG);
      else if (action === 'tariff-sms') sendSmsTo(n, TARIFF_MSG);
      else if (action === 'tariff-wa') sendWaTo(n, TARIFF_MSG);
      else if (action === 'aldagi-sms') sendSmsTo(n, ALDAGI_INFO);
      else if (action === 'aldagi-wa') sendWaTo(n, ALDAGI_INFO);
    };

    renderSmsList();

    $('nums').oninput = count;
    $('start').onclick = start;
    $('stop').onclick = stopAll;
    $('next-go').onclick = next;
    $('next-skip').onclick = () => { $('next-modal').classList.add('hide'); S.i++; S.run && S.i < S.q.length ? call() : done(); };
    $('time-ok').onclick = () => $('time-modal').classList.add('hide');
    $('paste').onclick = async () => {
      try {
        const t = await navigator.clipboard.readText();
        if (t) { $('nums').value = t; count(); setStatus('ჩასმულია'); }
      } catch { setStatus('ჩასმა ვერ მოხერხდა'); }
    };
    $('clear').onclick = () => { $('nums').value = ''; count(); localStorage.removeItem('nums'); };
    $('clr-hist').onclick = () => { localStorage.removeItem('hist'); showHist(); };

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') setTimeout(returned, 400);
    });
    window.addEventListener('pageshow', e => { if (e.persisted) setTimeout(returned, 400); });
    if ('serviceWorker' in navigator) navigator.serviceWorker.getRegistrations().then(r => r.forEach(x => x.unregister()));

    const saved = localStorage.getItem('nums');
    if (saved) $('nums').value = saved;
    count(); showHist();
  </script>
</body>
</html>
