<!DOCTYPE html>
<html lang="ka" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ავტოდაილერი">
  <meta name="theme-color" content="#121218">
  <meta name="color-scheme" content="dark">
  <title>ავტოდაილერი</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css?v=6">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>ავტოდაილერი</h1>
      <p class="subtitle" id="header-subtitle">მზად ხარ დასაწყებად</p>
    </header>

    <main class="main">
      <section class="view active" id="view-dial">
        <div class="card status-card" id="status-card">
          <div class="status-top">
            <span class="badge idle" id="status-badge">მზად</span>
            <span class="timer hidden" id="timer-text">30 წმ</span>
          </div>
          <p class="status-line" id="status-text">ჩასვი ნომრები და დააჭირე დაწყებას</p>
          <p class="status-phone hidden" id="status-number"></p>
          <div class="bar hidden" id="queue-progress"><i id="queue-fill"></i></div>
          <p class="bar-label hidden" id="queue-label"></p>
        </div>

        <div class="card">
          <div class="row-head">
            <h2>ნომრები</h2>
            <div class="row-actions">
              <button class="text-btn" id="btn-paste" type="button">ჩასმა</button>
              <button class="text-btn red" id="btn-clear" type="button">გასუფთავება</button>
            </div>
          </div>
          <textarea id="numbers-input" placeholder="თითო ხაზზე ერთი ნომერი&#10;599 12 34 56"></textarea>
          <p class="hint"><span id="numbers-count">0</span> ნომერი</p>
        </div>

        <div class="actions">
          <button class="btn main" id="btn-start" type="button">დაწყება</button>
          <div class="actions-row hidden" id="action-row">
            <button class="btn" id="btn-pause" type="button">პაუზა</button>
            <button class="btn red" id="btn-stop" type="button">გაჩერება</button>
            <button class="btn sm" id="btn-skip-current" type="button">Skip</button>
          </div>
        </div>
      </section>

      <section class="view" id="view-sms">
        <div class="card">
          <h2>მიმღები</h2>
          <div class="input-row">
            <input type="tel" id="sms-number" class="input" placeholder="+995 5XX XX XX XX" inputmode="tel">
            <button class="btn sm" id="btn-sms-current" type="button">მიმდინარე</button>
          </div>
        </div>
        <p class="label">შაბლონები</p>
        <div id="sms-templates"></div>
      </section>

      <section class="view" id="view-history">
        <div class="row-head pad">
          <h2>ისტორია</h2>
          <button class="text-btn red" id="btn-clear-history" type="button">გასუფთავება</button>
        </div>
        <div id="history-list" class="list">
          <p class="empty">ჯერ ზარები არ გაქვს</p>
        </div>
      </section>
    </main>

    <nav class="tabs">
      <button class="tab active" data-view="dial" type="button">დარეკვა</button>
      <button class="tab" data-view="sms" type="button">SMS</button>
      <button class="tab" data-view="history" type="button">ისტორია</button>
    </nav>
  </div>

  <div id="toast" class="toast hidden"></div>

  <div class="modal hidden" id="next-call-modal">
    <div class="modal-bg"></div>
    <div class="modal-box">
      <p class="modal-label" id="modal-label">შემდეგი</p>
      <p class="modal-num" id="modal-number"></p>
      <button class="btn main" id="btn-call-next" type="button">დარეკვა</button>
      <button class="btn" id="btn-skip-next" type="button">გამოტოვება</button>
    </div>
  </div>

  <div class="modal hidden" id="timeout-modal">
    <div class="modal-bg"></div>
    <div class="modal-box">
      <h3>დრო ამოიწურა</h3>
      <p>გათიშე ზარი და დაბრუნდი აპში</p>
      <button class="btn main" id="btn-timeout-ok" type="button">გასაგებია</button>
    </div>
  </div>

  <script src="app.js?v=6"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(r => r.forEach(x => x.unregister()));
    }
  </script>
</body>
</html>
